<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/login.css">
    <title>PROJETO ARCA - LOGIN</title>
</head>
<body>
    <main class="main-login">
        <section class="left-main">
            <h1> PROGRAMA ARCA </h1>
        </section>
            <section class="right-login">

                <h1> Bem vindo de volta </h1>
                 <p>Faça login com suas credenciais para acessar o sistema</p>
                <form id="form-login">
                    <label for="usuario">Usuário</label>
                    <input type="text" id="usuario" size="40" maxlength="40" value placeholder="">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" size="40" maxlength="40" value placeholder="">
                    <input type="checkbox" name="auto" value="auto">Lembrar de mim
                    <a href="#"> Esqueceu sua senha?</a>

                    <button type="submit">Entrar</button>
                </form>
            </section>
    </main>
</body>
</html>
