<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="frontend/assets/css/style.css">
    <link rel="stylesheet" href="frontend/assets/css/index.css">
    <title>PROJETO ARCA - LOGIN</title>
</head>
<body>
    <main class="main-login">

        <section class="left-main">
        </section>

        <section class="right-login">
            <div class="form-container">
                <h1 id="bem-vindo">Bem-vindo</h1>
                <p>Digite seus dados para acessar o sistema</p>

                <form id="form-login">
                    <label for="usuario">CPF ou CNPJ</label>
                    <input type="text" id="usuario" maxlength="18" placeholder="Digite seu CPF ou CNPJ">

                    <label for="senha">Senha</label>
                    <input type="password" id="senha" maxlength="40" placeholder="Digite sua senha">

                    <a href="#" class="link-esqueceu">Esqueceu sua senha?</a>

                    <button type="submit">Entrar</button>
                </form>

                <p class="termos">Ao entrar, você concorda com os Termos de Uso e Privacidade</p>
            </div>
        </section>

    </main>
</body>
</html>
